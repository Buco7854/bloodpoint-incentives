services:
  bloodpoint-incentive:
    build: .
    image: dbd-bloodpoint-incentive
    container_name: bloodpoint-incentive
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - path: .env
        required: false
    volumes:
      # Persists the last-working category across restarts.
      - bp-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bp-data:
